# Prometheus va « scraper » (interroger) périodiquement chaque cible listée ici.
# Cherchez les TODO : pour l'instant, Prometheus ne se surveille QUE lui-même.
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

