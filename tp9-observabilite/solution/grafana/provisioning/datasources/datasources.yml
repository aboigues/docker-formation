# Sources de données provisionnées automatiquement au démarrage de Grafana.
# Plus besoin de les ajouter à la main dans l'UI : tout est versionné ici.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
