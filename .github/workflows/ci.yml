name: TP — vérification

# « Si ce n'est pas testé par GitHub Actions, ça ne fonctionne pas. »
# Chaque TP est validé en exécutant son verify.sh sur la solution de référence.

on:
  push:
    paths:
      - "tp*/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "tp*/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  tp:
    runs-on: ubuntu-latest
    timeout-minutes: 12   # garde-fou : aucun TP ne doit tourner aussi longtemps
    strategy:
      fail-fast: false
      matrix:
        tp:
          - tp01-prise-en-main
          - tp02-cli
          - tp03-premiere-image
          - tp03b-dockerfile-avance
          - tp04-stack-manuelle
          - tp05-compose
          - tp06-compose-avance
          - tp07-registry
          - tp08-securite
          - tp09-observabilite
          - tp10-swarm-traefik
    name: ${{ matrix.tp }}
    steps:
      - uses: actions/checkout@v4

      - name: Environnement Docker
        run: |
          docker version
          docker compose version

      # Outillage supplémentaire requis par certains TP (installé uniquement si besoin).
      - name: Installer Trivy (TP8)
        if: matrix.tp == 'tp08-securite'
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.71.1

      - name: Rendre les scripts exécutables
        run: chmod +x scripts/lib.sh "${{ matrix.tp }}/verify.sh"

      - name: Vérifier le TP (solution de référence)
        working-directory: ${{ matrix.tp }}
        run: ./verify.sh solution
