name: TP — vérification

# « Si ce n'est pas testé par GitHub Actions, ça ne fonctionne pas. »
# Chaque TP est validé en exécutant son verify.sh sur la solution de référence.

on:
  push:
    paths:
      - "tp*/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "tp*/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  tp:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tp:
          - tp1-prise-en-main
          - tp2-cli
          - tp3-premiere-image
          - tp4-stack-manuelle
          - tp5-compose
          - tp6-compose-avance
          - tp7-registry
          - tp8-securite
          - tp9-observabilite
          - tp10-swarm-traefik
    name: ${{ matrix.tp }}
    steps:
      - uses: actions/checkout@v4

      - name: Environnement Docker
        run: |
          docker version
          docker compose version

      # Outillage supplémentaire requis par certains TP (installé uniquement si besoin).
      - name: Installer Trivy (TP8)
        if: matrix.tp == 'tp8-securite'
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.71.1

      - name: Rendre les scripts exécutables
        run: chmod +x scripts/lib.sh "${{ matrix.tp }}/verify.sh"

      - name: Vérifier le TP (solution de référence)
        working-directory: ${{ matrix.tp }}
        run: ./verify.sh solution
