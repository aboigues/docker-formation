# Stack de base, commune à tous les environnements.
# Valeurs sensibles et variables lues depuis le fichier .env (jamais en dur ici).
name: tp08-telescope

services:
  api:
    build:
      context: ../app
    image: telescope-api:tp6
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://cache:6379
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${API_PORT:-8085}:3000"
    # On ne démarre l'API que lorsque la base ET le cache sont RÉELLEMENT prêts.
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Postgres 18+ : les données vivent sous /var/lib/postgresql (le VOLUME a changé
      # par rapport aux versions <= 17 qui utilisaient /var/lib/postgresql/data).
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Pas de `ports:` -> Postgres n'est PAS joignable depuis l'hôte (isolation).

  cache:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Outil de debug, activé UNIQUEMENT avec --profile debug.
  adminer:
    image: adminer:5
    profiles: ["debug"]
    ports:
      - "8086:8080"
    depends_on:
      - db

volumes:
  db-data:
