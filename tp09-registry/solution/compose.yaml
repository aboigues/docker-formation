# Un registre Docker privé, protégé par authentification htpasswd.
# (En production on ajouterait TLS ; ici on reste en HTTP sur localhost, que
#  Docker accepte sans certificat car « localhost » est considéré comme sûr.)
name: tp9-registry

services:
  registry:
    image: registry:3
    ports:
      - "5000:5000"
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Registre interne Telescope"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    volumes:
      - ./auth:/auth:ro                  # le fichier htpasswd (généré par make-auth.sh)
      - registry-data:/var/lib/registry  # les images poussées SURVIVENT au redémarrage

volumes:
  registry-data:
