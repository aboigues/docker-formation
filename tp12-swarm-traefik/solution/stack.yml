# Stack Swarm : un vrai site Drupal RÉPLIQUÉ (3 instances) derrière Traefik,
# adossé à une base MariaDB. Déploiement : docker stack deploy -c stack.yml tp12
#
# Pré-requis : l'image applicative est construite AVANT le déploiement
#   docker build -t tp12-telemach-drupal:1.0 ../drupal
# (Swarm ne construit pas les images : il les tire d'un registre / cache local.)
services:

  # --- Base de données : 1 seul réplica (stateful), épinglée au manager + volume ---
  db:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: drupal
      MARIADB_USER: drupal
      MARIADB_PASSWORD: drupalpass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # --- Application : Drupal RÉPLIQUÉ 3x. Tous les réplicas partagent la MÊME base
  #     (settings.php lit la BDD depuis l'env) et le MÊME volume de fichiers. ---
  drupal:
    image: tp12-telemach-drupal:1.0
    hostname: "drupal-{{.Task.Slot}}"   # drupal-1/2/3 : visible dans l'en-tête X-Served-By
    environment:
      DRUPAL_DB_HOST: db
      DRUPAL_DB_NAME: drupal
      DRUPAL_DB_USER: drupal
      DRUPAL_DB_PASSWORD: drupalpass
    volumes:
      # Stockage partagé des fichiers du site (uploads, assets générés, config).
      # ⚠️ Sur un Swarm mono-nœud, ce volume nommé est partagé par les 3 réplicas.
      #    En vrai multi-nœuds, il faudrait un stockage RÉSEAU (NFS, GlusterFS, CSI…).
      - drupal-files:/opt/drupal/web/sites/default/files
    deploy:
      replicas: 3
      labels:
        # En Swarm, les labels Traefik se mettent sous deploy.labels (niveau service).
        - traefik.enable=true
        - traefik.http.routers.drupal.rule=Host(`drupal.localhost`)
        - traefik.http.routers.drupal.entrypoints=web
        - traefik.http.services.drupal.loadbalancer.server.port=80

  # --- Reverse-proxy : découvre Drupal via l'API Swarm et répartit sur les 3 réplicas ---
  traefik:
    image: traefik:v3.7.5
    command:
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true        # dashboard sans auth — OK en formation, JAMAIS en prod
    ports:
      # Ports en mode HOST (cf. README) : Traefik EST le load-balancer, on évite
      # d'empiler l'ingress mesh de Swarm par-dessus.
      - target: 80
        published: 8090
        mode: host
      - target: 8080
        published: 8091
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

volumes:
  db-data:
  drupal-files:
