# Stack Swarm à COMPLÉTER. Cherchez les « TODO ».
# Déploiement : docker stack deploy -c stack.yml tp12
# (Construisez d'abord l'image : docker build -t tp12-telemach-drupal:1.0 ../drupal)
services:

  # --- Base de données : FOURNIE (rien à modifier) ---
  db:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: drupal
      MARIADB_USER: drupal
      MARIADB_PASSWORD: drupalpass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # --- Application Drupal : À COMPLÉTER ---
  drupal:
    image: tp12-telemach-drupal:1.0
    hostname: "drupal-{{.Task.Slot}}"
    # TODO 1 — Connexion BDD : ajoutez le bloc `environment:` avec
    #   DRUPAL_DB_HOST=db, DRUPAL_DB_NAME=drupal, DRUPAL_DB_USER=drupal, DRUPAL_DB_PASSWORD=drupalpass
    # ______

    # TODO 2 — Stockage partagé : montez le volume nommé `drupal-files`
    #   sur /opt/drupal/web/sites/default/files
    # ______

    deploy:
      # TODO 3 — Réplication : 3 instances de Drupal.
      # ______
      # TODO 4 — Les 4 labels Traefik (sous deploy.labels, car en Swarm c'est le
      #   SERVICE qui porte les labels) :
      #     traefik.enable=true
      #     traefik.http.routers.drupal.rule=Host(`drupal.localhost`)
      #     traefik.http.routers.drupal.entrypoints=web
      #     traefik.http.services.drupal.loadbalancer.server.port=80
      # ______

  # --- Reverse-proxy : FOURNI (rien à modifier) ---
  traefik:
    image: traefik:v3.7.5
    command:
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - target: 80
        published: 8090
        mode: host
      - target: 8080
        published: 8091
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

volumes:
  db-data:
  drupal-files:
