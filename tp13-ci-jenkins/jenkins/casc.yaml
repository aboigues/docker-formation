# Configuration as Code (JCasC) — l'état COMPLET de ce Jenkins, en un fichier.
# Chargé au démarrage (variable CASC_JENKINS_CONFIG). Aucune configuration à la souris.
jenkins:
  systemMessage: "Telemach CI — TP13 · chaîne d'intégration Docker (Build → Test → Scan → Push)"
  numExecutors: 2
  # Sécurité minimale : un seul compte admin/admin (mots de passe FICTIFS, cf. conventions).
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://localhost:8080/"

# Le job du pipeline est lui aussi décrit ici (via Job DSL). Son contenu (les étapes)
# est lu depuis le fichier « Jenkinsfile » monté dans $JENKINS_HOME : c'est CE fichier
# que le stagiaire complète.
jobs:
  - script: |
      pipelineJob('telemach-pipeline') {
        description('Build → Test → Scan (Trivy) → Push vers le registre privé')
        // Jeton de déclenchement distant (comme un webhook git) : permet à verify.sh
        // (et à un vrai dépôt) de lancer le build via une simple requête HTTP.
        authenticationToken('telemach')
        definition {
          cps {
            // Le contenu du pipeline est lu depuis le Jenkinsfile monté dans le
            // conteneur : c'est CE fichier que le stagiaire complète.
            script(new File('/var/jenkins_home/Jenkinsfile').text)
            sandbox(true)
          }
        }
      }
