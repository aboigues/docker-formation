# Stack Swarm à COMPLÉTER. Cherchez les « TODO ».
# Déploiement : docker stack deploy -c stack.yml tp10
services:
  traefik:
    image: traefik:v3.7.5
    command:
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    # Ports en mode HOST (bind direct sur le nœud) : fiable sur un Swarm mono-nœud.
    ports:
      - target: 80
        published: 8090
        mode: host
      - target: 8080
        published: 8091
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

  whoami:
