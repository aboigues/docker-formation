# TP3 — Solution de référence : la stack WordPress + MySQL en Compose.

services:
  mysql:
    image: mysql:8.4
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wpsecret

  wordpress:
    image: telemachlearning/wordpress:6.8-php8.3-apache
    ports:
      - "8083:80"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wpsecret
    depends_on:
      - mysql

volumes:
  db-data:
